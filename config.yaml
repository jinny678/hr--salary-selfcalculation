# ============================================================
# 薪酬计算交叉验证工具 - 配置文件
# 修改此文件即可调整规则参数，无需改动代码
# ============================================================

# 个税税率表（累计预扣法）
tax_brackets:
  - [0, 36000, 0.03, 0]
  - [36000, 144000, 0.10, 2520]
  - [144000, 300000, 0.20, 16920]
  - [300000, 420000, 0.25, 31920]
  - [420000, 660000, 0.30, 52920]
  - [660000, 960000, 0.35, 85920]
  - [960000, 999999999, 0.45, 181920]

# 个税参数
tax_months_ytd: 6        # 当前累计月数（6月=6，需每月更新）
tax_free_threshold: 5000  # 个税起征点/月

# 阈值设置
thresholds:
  anomaly_change_pct: 10  # 环比异常变动率阈值(%)

# 环比异常检测：项目名，上月列后缀，变动金额阈值
anomaly_items:
  - [基本工资, 基本工资, 500]
  - [绩效工资, 绩效工资, 200]
  - [应发工资, 应发工资, 1000]
  - [实发金额, 实发金额, 1000]
  - [个税, 个税, 500]
  - [扣缺勤, 扣缺勤, 100]
  - [全勤津贴, 全勤津贴, 250]
  - [并入纳税, 并入纳税, 500]

# 给予规则参数
rules:
  hours_per_month: 174          # 月标准工时 (21.75×8)
  full_attendance_bonus: 250    # 全勤津贴
  absence_deduction_per_day: 50 # 缺勤扣款/天
  mid_shift_allowance: 7        # 中班津贴 元/班次
  night_shift_allowance: 17     # 夜班津贴 元/班次
  guangzhou_min_wage: 2500      # 广州市最低工资标准
  sick_pay_rate: 0.8            # 病假工资比例
  overtime_rate_normal: 1.5     # 平时加班
  overtime_rate_weekend: 2.0    # 休日加班
  overtime_rate_holiday: 3.0    # 节日加班
  high_temp_months: [6, 7, 8, 9, 10]  # 高温津贴发放月份
  high_temp_amount: 300         # 高温津贴月标准

